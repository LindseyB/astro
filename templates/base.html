<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Astro Horoscope{% endblock %}</title>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:title" content="{% block og_title %}Astro Horoscope - Your Cosmic Vibe Check{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Get your personalized astrological chart with AI-powered cosmic insights. Discover your sun, moon, and rising signs with beautiful animations and zoomer astrology vibes! ✨🌙⭐{% endblock %}">
    <meta property="og:image" content="{{ url_for('static', filename='images/og-image.png', _external=True) }}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="Astro Horoscope">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ request.url }}">
    <meta name="twitter:title" content="{% block twitter_title %}Astro Horoscope - Your Cosmic Vibe Check{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Get your personalized astrological chart with AI-powered cosmic insights. Discover your sun, moon, and rising signs! ✨🌙⭐{% endblock %}">
    <meta name="twitter:image" content="{{ url_for('static', filename='images/twitter-card.png', _external=True) }}">
    <meta name="twitter:image:alt" content="Astro Horoscope - Personalized astrological charts with cosmic animations">
    
    <!-- General Meta -->
    <meta name="description" content="{% block meta_description %}Get your personalized astrological chart with AI-powered cosmic insights. Beautiful animations, zoomer astrology vibes, and accurate planetary positions.{% endblock %}">
    <meta name="keywords" content="astrology, horoscope, natal chart, zodiac, sun sign, moon sign, rising sign, astrological chart, cosmic, AI astrology">
    <meta name="author" content="Astro Horoscope">
    
    <!-- Favicons and Icons -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/sparkle.svg') }}" />
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/sparkle-192.png') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='icons/site.webmanifest') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Select2 for searchable dropdowns -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cosmic.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/button-effect.css') }}">
    <!-- Dark mode: apply class before paint to prevent flash. Defaults to dark unless the user opted out. -->
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved !== 'light') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    {% block extra_scripts %}{% endblock %}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="aurora-bg" aria-hidden="true"></div>
    <div class="aurora-sparkles" aria-hidden="true"></div>
    <div class="shooting-stars" aria-hidden="true">
      <span class="shooting-star"></span>
      <span class="shooting-star"></span>
      <span class="shooting-star"></span>
    </div>
    {% block content %}{% endblock %}
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <!-- Shared theme toggle: attaches to #themeToggle on any page that has it -->
    <script>
      (function () {
        var toggles = document.querySelectorAll('#themeToggle');
        if (!toggles.length) return;

        function updateThemeToggleState(toggle, isDark) {
          toggle.setAttribute('aria-pressed', isDark ? 'true' : 'false');
          toggle.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
        }

        toggles.forEach(function (toggle) {
          updateThemeToggleState(toggle, document.documentElement.classList.contains('dark'));
          toggle.addEventListener('click', function () {
            var root = document.documentElement;
            root.classList.toggle('dark');
            var isDark = root.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            toggles.forEach(function (t) {
              updateThemeToggleState(t, isDark);
            });
          });
        });

        window.addEventListener('storage', function (e) {
          if (e.key !== 'theme') return;
          var root = document.documentElement;
          if (e.newValue === 'light') {
            root.classList.remove('dark');
          } else {
            root.classList.add('dark');
          }
          var isDark = root.classList.contains('dark');
          toggles.forEach(function (toggle) {
            updateThemeToggleState(toggle, isDark);
          });
        });
      })();
    </script>
    <!-- Dramatic glitter sparkles over the light-mode aurora -->
    <script src="{{ url_for('static', filename='js/aurora-sparkle.js') }}"></script>
    <!-- Frost the sticky header backdrop once the page is scrolled -->
    <script src="{{ url_for('static', filename='js/header-scroll.js') }}"></script>
    {% block page_scripts %}{% endblock %}
</body>
</html>
